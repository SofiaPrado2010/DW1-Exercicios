<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Teste Layout Flex</title>
  <link rel="stylesheet" href="Flex.css">
</head>

<body>

  <div class="linha linha1">
    <div class="coluna">1.1</div>
    <div class="coluna">1.2</div>
  </div>

  <div class="linha linha2">
    <div class="coluna">2.1</div>
    <div class="coluna">2.2</div>
  </div>
  
  <div class="linha linha3">
    <div class="coluna">3.1</div>
    <div class="coluna">
        <div class="subcoluna">
          <img src="gato.jpeg" alt="Gato">
          <p>GATO</p>
      </div>
        <div class="subcoluna">
          <img src="cachorro.jpeg" alt="Cachorro">
          <p>CACHORRO</p>
        </div>
        <div class="subcoluna">
          <img src="coelho.jpeg" alt="Coelho">
          <p>COELHO</p>
        </div>
    </div>

  </div>

  <div class="linha linha4">
    <div class="coluna horizontal">
        <div class="subcoluna">
          <img src="casa.jpeg" alt="Casa">
          <p>CASA</p>
        </div>
        <div class="subcoluna">
          <img src="castelo.jpeg" alt="Castelo">
          <p>CASTELO</p>
        </div>
    </div>
    <div class="coluna vertical">
      <div class="subcoluna">4.2.1</div>
      <div class="subcoluna">4.2.2</div>
    </div>
  </div>

</body>

</html>
